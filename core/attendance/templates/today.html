<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Today's Attendance</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #e3f2fd;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 30px;
    }

    h2 {
      text-align: center;
      color: #1976d2;
      margin-bottom: 25px;
      font-size: 2em;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    table th, table td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: center;
      font-size: 1em;
    }

    table th {
      background: #1976d2;
      color: #fff;
      font-weight: bold;
    }

    table tr:nth-child(even) {
      background: #f9f9f9;
    }

    .status {
      font-weight: bold;
      padding: 8px 15px;
      border-radius: 20px;
      display: inline-block;
    }

    .present {
      background: #c8e6c9;
      color: #2e7d32;
    }

    .absent {
      background: #ffcdd2;
      color: #c62828;
    }

    img {
      border-radius: 8px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 20px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 6px;
      transition: 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn-logout {
      background: #d32f2f;
      color: #fff;
    }

    .btn-logout:hover {
      background: #b71c1c;
    }

    .btn-refresh {
      background: #1976d2;
      color: #fff;
    }

    .btn-refresh:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h2>📅 Today's Attendance</h2>
      <div>
        <button class="btn btn-refresh" onclick="loadToday()">🔄 Refresh</button>
        <button class="btn btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <table id="todayTable">
      <thead>
        <tr>
          <th>Roll No</th>
          <th>Name</th>
          <th>Status</th>
          <th>Marked At</th>
          <th>Photo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const token = localStorage.getItem("accessToken");
    if(!token) window.location.href = "/api/auth/login-page/";

    async function loadToday() {
      const res = await fetch("/today-status/", {
        headers: { "Authorization": "Bearer " + token }
      });
      if (res.status === 401) {
        localStorage.removeItem("accessToken");
        window.location.href = "/api/auth/login-page/";
        return;
      }
      const data = await res.json();

      const tbody = document.querySelector("#todayTable tbody");
      tbody.innerHTML = "";

      data.forEach(s => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${s.roll_no}</td>
          <td>${s.name}</td>
          <td>
            <span class="status ${s.status === "Present" ? "present" : "absent"}">
              ${s.status}
            </span>
          </td>
          <td>${s.marked_at ? new Date(s.marked_at).toLocaleString() : "-"}</td>
          <td>${s.photo ? `<img src="${s.photo}" width="60"/>` : "-"}</td>
        `;
        tbody.appendChild(row);
      });
    }

    function logout() {
      localStorage.removeItem("accessToken");
      window.location.href = "/api/auth/login-page/";
    }

    // Load on start
    loadToday();
  </script>
</body>
</html>
