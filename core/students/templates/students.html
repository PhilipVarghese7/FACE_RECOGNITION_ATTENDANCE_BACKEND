<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Students - Face Rec Attendance</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e3f2fd;
    margin: 0;
    padding: 0;
  }
  .navbar {
    background: #1976d2;
    color: white;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .navbar button {
    background: #fff;
    color: #1976d2;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    font-weight: bold;
    margin-left: 10px;
  }
  .navbar button:hover { background: #e3f2fd; }
  .container {
    max-width: 1000px;
    margin: 20px auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    padding: 30px;
  }
  h2 { color: #1976d2; text-align: center; }
  form {
    display: flex;
    justify-content: space-between;
    margin-bottom: 30px;
    gap: 10px;
  }
  form input, form button {
    padding: 10px;
    font-size: 1em;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  form input { flex: 1; }
  form button {
    background: #1976d2;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
  }
  form button:hover { background: #1565c0; }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  table th, table td {
    border: 1px solid #ccc;
    padding: 12px;
    text-align: left;
  }
  table th { background: #1976d2; color: white; }
  .message { margin-bottom: 20px; font-weight: bold; color: green; }
  .actions button {
    margin-right: 5px;
    padding: 5px 10px;
    font-size: 0.9em;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }
  .edit-btn { background: #0288d1; color: #fff; }
  .edit-btn:hover { background: #0277bd; }
  .delete-btn { background: #d32f2f; color: #fff; }
  .delete-btn:hover { background: #b71c1c; }
</style>
</head>
<body>
<div class="navbar">
  <div>Students Dashboard</div>
  <div>
    <button id="todayBtn">Today's Attendance</button>
    <button id="attendanceBtn">Mark Attendance</button>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<div class="container">
  <h2>Manage Students</h2>
  <div class="message" id="message"></div>

  <form id="studentForm">
    <input type="hidden" id="student_id">
    <input type="text" id="roll_no" placeholder="Roll No" required>
    <input type="text" id="name" placeholder="Student Name" required>
    <input type="file" id="photo" accept="image/*">
    <button type="submit">Add Student</button>
  </form>

  <table id="studentsTable">
    <thead>
      <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Photo</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const token = localStorage.getItem("accessToken");
if(!token) window.location.href = "/api/auth/login-page/";

const form = document.getElementById("studentForm");
const messageDiv = document.getElementById("message");
const tableBody = document.querySelector("#studentsTable tbody");
const studentIdInput = document.getElementById("student_id");

const logoutBtn = document.getElementById("logoutBtn");
const attendanceBtn = document.getElementById("attendanceBtn");
const todayBtn = document.getElementById("todayBtn");

// Logout
logoutBtn.addEventListener("click", () => {
  localStorage.removeItem("accessToken");
  window.location.href = "/api/auth/login-page/";
});

// Redirect to attendance
attendanceBtn.addEventListener("click", () => {
  window.location.href = "/live/";
});

// Redirect to today's attendance
todayBtn.addEventListener("click", () => {
  window.location.href = "/today/";
});

// Load students
async function loadStudents() {
  const res = await fetch("/api/students/", {
    headers: { "Authorization": "Bearer " + token }
  });
  if(res.status === 401) {
    localStorage.removeItem("accessToken");
    window.location.href = "/api/auth/login-page/";
    return;
  }
  const data = await res.json();
  tableBody.innerHTML = "";
  data.forEach(s => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${s.roll_no}</td>
      <td>${s.name}</td>
      <td><img src="${s.photo}" width="60"/></td>
      <td class="actions">
        <button class="edit-btn" onclick="editStudent(${s.id}, '${s.roll_no}', '${s.name}')">Edit</button>
        <button class="delete-btn" onclick="deleteStudent(${s.id})">Delete</button>
      </td>
    `;
    tableBody.appendChild(row);
  });
}

// Add or Update student
form.addEventListener("submit", async e => {
  e.preventDefault();
  const id = studentIdInput.value;
  const roll_no = document.getElementById("roll_no").value;
  const name = document.getElementById("name").value;
  const photo = document.getElementById("photo").files[0];

  const formData = new FormData();
  formData.append("roll_no", roll_no);
  formData.append("name", name);
  if(photo) formData.append("photo", photo);

  let url = "/api/students/";
  let method = "POST";
  if(id) {
    url = `/api/students/${id}/`;
    method = "PUT";
  }

  const res = await fetch(url, {
    method: method,
    headers: { "Authorization": "Bearer " + token },
    body: formData
  });

  const result = await res.json();
  if(res.ok) {
    messageDiv.innerText = id ? "Student updated successfully!" : "Student added successfully!";
    form.reset();
    studentIdInput.value = "";
    form.querySelector("button").innerText = "Add Student";
    loadStudents();
  } else {
    messageDiv.innerText = JSON.stringify(result);
  }
});

// Edit student
function editStudent(id, roll_no, name) {
  studentIdInput.value = id;
  document.getElementById("roll_no").value = roll_no;
  document.getElementById("name").value = name;
  form.querySelector("button").innerText = "Update Student";
}

// Delete student
async function deleteStudent(id) {
  if(!confirm("Are you sure you want to delete this student?")) return;
  const res = await fetch(`/api/students/${id}/`, {
    method: "DELETE",
    headers: { "Authorization": "Bearer " + token }
  });
  if(res.ok) {
    messageDiv.innerText = "Student deleted successfully!";
    loadStudents();
  } else {
    const result = await res.json();
    messageDiv.innerText = JSON.stringify(result);
  }
}

// Initial load
loadStudents();
</script>
</body>
</html>
